<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melik RP</title>

  <style>
    body{
      margin:0;
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .hero{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    h1{
      font-size:70px;
      color:#00ffcc;
      text-shadow:0 0 20px #00ffcc;
    }

    p{
      font-size:22px;
      opacity:0.8;
    }

    .btn{
      margin-top:20px;
      padding:15px 35px;
      background:#00ffcc;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.1);
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>MELIK RP</h1>
    <p>Yeni Nesil FiveM Roleplay Deneyimi</p>

    <a class="btn" href="#">
      DISCORD KATIL
    </a>
  </div>

</body>
</html>
